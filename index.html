<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คณิตศาสตร์ไม่ต่อเนื่อง | รศ.ดร.อนุชิต จิตพัฒนกุล | KMUTNB</title>
  <meta name="description" content="เว็บไซต์รายวิชาคณิตศาสตร์ไม่ต่อเนื่อง (Discrete Mathematics) ภาคการศึกษาที่ 1 ปีการศึกษา 2569 โดย รศ.ดร.อนุชิต จิตพัฒนกุล มหาวิทยาลัยเทคโนโลยีพระจอมเกล้าพระนครเหนือ">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>∑</text></svg>">
</head>
<body>

  <header>
    <div class="header-inner">
      <a class="header-logo" onclick="renderHome()" href="#">
        <div class="logo-icon">∑</div>
        <div class="logo-text">
          Discrete Math
          <small>KMUTNB · 1/2569</small>
        </div>
      </a>

      <nav class="nav-chapters" id="nav-chapters">
        <!-- Chapters 1-12 rendered by JS -->
      </nav>

      <button class="menu-toggle" id="menu-toggle" aria-label="เมนู">☰</button>
    </div>
  </header>

  <div id="main-content"></div>

  <footer>
    <p><strong>คณิตศาสตร์ไม่ต่อเนื่อง (Discrete Mathematics)</strong></p>
    <p>รศ.ดร.อนุชิต จิตพัฒนกุล · ภาควิชาคณิตศาสตร์ คณะวิทยาศาสตร์ประยุกต์ · มหาวิทยาลัยเทคโนโลยีพระจอมเกล้าพระนครเหนือ</p>
    <p>ภาคการศึกษาที่ 1 ปีการศึกษา 2569 · เนื้อหาจาก <em>Discrete Mathematics with Applications</em> — Susanna S. Epp</p>
  </footer>

  <script src="js/app.js"></script>
  <script>
    // Populate header nav after courseData is loaded
    document.addEventListener('DOMContentLoaded', () => {
      const nav = document.getElementById('nav-chapters');
      courseData.chapters.forEach(ch => {
        const el = document.createElement('span');
        el.className = 'nav-chapter-item';
        el.dataset.ch = ch.id;
        el.textContent = `บทที่ ${ch.id}`;
        el.addEventListener('click', () => {
          if (ch.contentPage) window.location.href = ch.contentPage;
          else renderChapter(ch.id);
        });
        nav.appendChild(el);
      });
    });
  </script>
</body>
</html>
